<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | Royal Sweets</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }
</style>

<!-- Google Identity SDK -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

</head>

<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4 py-8 relative overflow-hidden">

<a href="login.html" class="absolute top-6 left-6 w-10 h-10 sm:top-8 sm:left-8 sm:w-12 sm:h-12 bg-white rounded-full flex items-center justify-center shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors z-10 hover:-translate-x-1 duration-300">
    <i class="fa-solid fa-arrow-left text-slate-600 sm:text-base text-sm"></i>
</a>

<!-- Decorative bg elements -->
<div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-orange-500/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-orange-400/10 rounded-full blur-3xl pointer-events-none"></div>

<div class="w-full max-w-[420px] relative z-10">
    <div class="bg-white/80 backdrop-blur-xl rounded-[2rem] sm:rounded-[2.5rem] p-6 sm:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white">

        <div class="text-center mb-6 sm:mb-8">
            <div class="w-14 h-14 sm:w-16 sm:h-16 bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl mx-auto mb-4 sm:mb-6 flex items-center justify-center text-white text-xl sm:text-2xl shadow-lg shadow-slate-900/20 transform rotate-3 hover:rotate-0 transition-all duration-300">
                <i class="fa-solid fa-user-plus text-orange-400"></i>
            </div>
            <h2 class="text-2xl sm:text-3xl font-black text-slate-800 tracking-tight">
                Create Account
            </h2>
            <p class="text-slate-500 font-medium mt-1 sm:mt-2 text-sm sm:text-base">
                Join the Royal Sweets family today.
            </p>
        </div>

        <form id="signupForm" class="space-y-3 sm:space-y-4">
            
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-orange-500 transition-colors z-10">
                    <i class="fa-regular fa-user"></i>
                </div>
                <input id="name" type="text" placeholder="Full Name" required
                    class="relative w-full bg-slate-50/50 border border-slate-200 py-3 sm:py-4 pl-10 sm:pl-12 pr-4 rounded-xl outline-none focus:bg-white focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10 transition-all font-medium text-slate-700 placeholder:text-slate-400 text-sm sm:text-base">
            </div>

            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-orange-500 transition-colors z-10">
                    <i class="fa-regular fa-envelope"></i>
                </div>
                <input id="email" type="email" placeholder="Email Address" required
                    class="relative w-full bg-slate-50/50 border border-slate-200 py-3 sm:py-4 pl-10 sm:pl-12 pr-4 rounded-xl outline-none focus:bg-white focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10 transition-all font-medium text-slate-700 placeholder:text-slate-400 text-sm sm:text-base">
            </div>

            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-orange-500 transition-colors z-10">
                    <i class="fa-solid fa-phone text-[12px] sm:text-[14px]"></i>
                </div>
                <input id="phone" type="tel" placeholder="WhatsApp Number" required
                    class="relative w-full bg-slate-50/50 border border-slate-200 py-3 sm:py-4 pl-10 sm:pl-12 pr-4 rounded-xl outline-none focus:bg-white focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10 transition-all font-medium text-slate-700 placeholder:text-slate-400 text-sm sm:text-base">
            </div>

            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 sm:pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-orange-500 transition-colors z-10">
                    <i class="fa-solid fa-lock text-[12px] sm:text-[14px]"></i>
                </div>
                <input id="password" type="password" placeholder="Create Password" required
                    class="relative w-full bg-slate-50/50 border border-slate-200 py-3 sm:py-4 pl-10 sm:pl-12 pr-4 rounded-xl outline-none focus:bg-white focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10 transition-all font-medium text-slate-700 placeholder:text-slate-400 text-sm sm:text-base">
            </div>

            <button type="submit"
                class="w-full bg-orange-500 text-white py-3 sm:py-4 rounded-xl font-bold tracking-wide shadow-lg shadow-orange-500/30 hover:shadow-orange-500/40 hover:-translate-y-0.5 active:scale-[0.98] transition-all flex justify-center items-center mt-2 sm:mt-4 text-sm sm:text-base">
                Create Account
            </button>
        </form>

        <div class="mt-6 flex items-center justify-between">
            <span class="border-b border-slate-200 w-1/5 lg:w-1/4"></span>
            <span class="text-xs text-center text-slate-500 uppercase font-bold tracking-widest">or continue with</span>
            <span class="border-b border-slate-200 w-1/5 lg:w-1/4"></span>
        </div>

        <div class="mt-6 flex justify-center">
            <div id="g_id_onload"
                 data-client_id="202166681296-2vbnjbi9cln832c8dg2bus3u2sjgrbrg.apps.googleusercontent.com"
                 data-context="signup"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <!-- Google Sign-Up Button Container -->
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signup_with"
                 data-size="large"
                 data-logo_alignment="left"
                 data-width="340">
            </div>
        </div>

        <p class="text-center mt-4 sm:mt-6 text-sm font-medium text-slate-500">
            Already a member? 
            <a href="login.html" class="text-orange-600 font-bold hover:underline underline-offset-4 decoration-2 transition-all">
                Sign in
            </a>
        </p>
    </div>
</div>

<script>

// Helper to detect if testing locally to avoid frustrating CORS/Network errors before deploying on Render
const getBaseUrl = () => {
    return (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') 
        ? "http://localhost:5000" 
        : "https://restaurant-site-8y41.onrender.com";
};

// 1. Traditional Signup + Google Phone Completion
let pendingGoogleData = null;

// Check if we were redirected here from Google Login
document.addEventListener("DOMContentLoaded", () => {
    const rawData = sessionStorage.getItem("pendingGoogleSignup");
    if (rawData) {
        pendingGoogleData = JSON.parse(rawData);
        
        // Auto-fill and lock the fields they already gave us via Google
        const nameField = document.getElementById("name");
        const emailField = document.getElementById("email");
        const passwordContainer = document.getElementById("password").closest('.group');
        
        nameField.value = pendingGoogleData.name;
        nameField.readOnly = true;
        nameField.classList.add("opacity-60", "cursor-not-allowed");

        emailField.value = pendingGoogleData.email;
        emailField.readOnly = true;
        emailField.classList.add("opacity-60", "cursor-not-allowed");

        // Hide password entirely, they don't need one!
        passwordContainer.style.display = "none";

        // Update the button text 
        document.querySelector("button[type='submit']").innerText = "Complete Registration";

        // Hide the "Or continue with Google" section since they are already using Google
        document.getElementById("g_id_onload").parentElement.style.display = "none";
        document.querySelector(".mt-6.flex.items-center.justify-between").style.display = "none";
        
        // Let them know what's happening
        setTimeout(() => alert(`Welcome ${pendingGoogleData.name}! Please provide your WhatsApp number to complete your registration.`), 100);
    }
});

document.getElementById("signupForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const password = document.getElementById("password").value;

    // Strict Phone Format Validation (Basic 10 digit Indian standard check)
    const phoneRegex = /^[0-9]{10}$/;
    if(!phoneRegex.test(phone)) {
        alert("Please enter a valid 10-digit WhatsApp number.");
        return;
    }

    try{
        const payload = { name, email, phone };
        
        if (pendingGoogleData) {
            // They are completing a Google Signin, pass the ID and NO password
            payload.googleId = pendingGoogleData.googleId;
        } else {
            // Traditional signup, password is required
            if (!password) {
                alert("Please enter a password.");
                return;
            }
            payload.password = password;
        }

        const res = await fetch(`${getBaseUrl()}/api/auth/signup`,{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify(payload)
        });

        const data = await res.json();
        
        if (res.status !== 200) {
            alert(data.message || "Signup failed");
            return;
        }

        // Clean up the temporary session
        sessionStorage.removeItem("pendingGoogleSignup");
        
        alert("Account created successfully. Please login!");
        window.location.href="login.html";

    }catch(err){
        alert("Signup failed");
    }
});

// 2. Seamless Google Auth Callback
async function handleCredentialResponse(response) {
    try {
        // Send Google token to our backend
        const res = await fetch(`${getBaseUrl()}/api/auth/google`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: response.credential })
        });

        const data = await res.json();

        if (res.status !== 200) {
            alert(data.message || "Google Signup failed");
            return;
        }

        /* AUTO LOGIN THE USER AND REDIRECT */
        localStorage.setItem("royalSweetsUser", JSON.stringify(data));

        if(data.role==="delivery"){
            window.location.href="delivery-dashboard.html";
        } else if(data.role==="admin"){
            window.location.href="admin-dashboard.html";
        } else{
            window.location.href="menu.html";
        }

    } catch(err) {
        console.log("Google error: ", err);
        alert("Google Verification failed");
    }
}

</script>

</body>
</html>
