<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | Royal Sweets</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }
</style>

</head>

<body class="bg-[#F8F9FA] min-h-screen flex flex-col items-center justify-center p-4 py-12">

<div class="w-full max-w-md bg-white rounded-[3rem] p-10 shadow-xl border border-gray-50">

<div class="text-center mb-10">

<div class="w-16 h-16 bg-slate-900 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-2xl shadow-lg shadow-slate-100">
<i class="fa-solid fa-user-plus text-orange-500"></i>
</div>

<h2 class="text-3xl font-black text-gray-800 uppercase italic tracking-tighter">
Create Account
</h2>

<p class="text-gray-400 text-sm font-bold mt-1">
Join the Royal Sweets family
</p>

</div>

<form id="signupForm" class="space-y-4">

<div class="relative">
<input id="name" type="text" placeholder="Full Name"
class="w-full bg-gray-50 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500">
</div>

<div class="relative">
<input id="email" type="email" placeholder="Email Address"
class="w-full bg-gray-50 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500">
</div>

<div class="relative">
<input id="phone" type="tel" placeholder="WhatsApp Number"
class="w-full bg-gray-50 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500">
</div>

<div class="relative">
<input id="password" type="password" placeholder="Create Password"
class="w-full bg-gray-50 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500">
</div>

<button
type="submit"
class="w-full bg-orange-500 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">

Register Now

</button>

</form>

<p class="text-center mt-8 text-sm font-bold text-gray-500">
Already a member?
<a href="login.html" class="text-orange-500 underline">
Login here
</a>
</p>

</div>

<script>

document.getElementById("signupForm").addEventListener("submit", async function(e){

e.preventDefault();

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const phone=document.getElementById("phone").value;
const password=document.getElementById("password").value;

try{

const res = await fetch("https://restaurant-site-8y41.onrender.com/api/auth/signup",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
email,
phone,
password
})

});

const data = await res.json();

alert("Account created successfully");

window.location.href="login.html";

}catch(err){

alert("Signup failed");

}

});

</script>

</body>
</html>
