<!DOCTYPE html>
<html>

<head>

<title>Track Order</title>
    <!-- Favicon -->
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta property="og:image" content="logo.png">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
}

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>
    <!-- Video Preloader -->
    <div id="preloader" class="fixed inset-0 z-[9999] bg-black flex items-center justify-center transition-opacity duration-500 overflow-hidden">
        <video id="preloader-video" autoplay muted loop playsinline class="w-full h-full object-cover">
            <source src="loading.mp4" type="video/mp4">
        </video>
    </div>


<div id="map"></div>

<script>

const params = new URLSearchParams(window.location.search);
const orderId = params.get("orderId");

const map = L.map('map').setView([17.3850,78.4867],13);

L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
maxZoom: 20,
attribution: '&copy; Google Maps'
}).addTo(map);

const bikeIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/2972/2972185.png",
iconSize:[40,40]
});

const marker = L.marker([17.3850,78.4867],{icon:bikeIcon}).addTo(map);

async function loadLocation(){

const res = await fetch(`https://restaurant-site-8y41.onrender.com/api/orders/${orderId}`);
const order = await res.json();

if(order.deliveryLocation){

const lat = order.deliveryLocation.lat;
const lng = order.deliveryLocation.lng;

marker.setLatLng([lat,lng]);

map.setView([lat,lng]);

}

}

setInterval(loadLocation,3000);

</script>


    <!-- Preloader Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Set correct video for device
            const preloaderVideo = document.getElementById('preloader-video');
            if (preloaderVideo) {
                const isMobile = window.innerWidth < 768;
                const videoSrc = isMobile ? 'phone.mp4' : 'loading.mp4';
                preloaderVideo.src = videoSrc;
                preloaderVideo.load();
            }

            document.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', function(e) {
                    const href = this.getAttribute('href');
                    if (href && href.endsWith('.html') && !href.startsWith('#') && !this.hasAttribute('target') && !href.includes('mailto:') && !href.includes('tel:')) {
                        e.preventDefault();
                        const preloader = document.getElementById('preloader');
                        if (preloader) {
                            preloader.style.display = 'flex';
                            setTimeout(() => preloader.style.opacity = '1', 10);
                            setTimeout(() => window.location.href = href, 1500); // Fixed 1.5s transition
                        } else {
                            window.location.href = href;
                        }
                    }
                });
            });
        });

        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 500);
                }, 1500); // Fixed 1.5s load time
            }
        });
    </script>

</body>

</html>
