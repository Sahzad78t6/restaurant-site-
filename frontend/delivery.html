<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Partner App | Royal Sweets</title>
    <!-- Favicon -->
    <link rel="icon" href="logo.png" type="image/png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#ff3b3b',
                            darkred: '#8b0000',
                            orange: '#ff6b00',
                        },
                        dark: {
                            900: '#0a0a0a',
                            800: '#141414',
                            700: '#1f1f1f',
                        }
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        display: ['Oswald', 'sans-serif'],
                    },
                    backgroundImage: {
                        'fire-gradient': "linear-gradient(135deg, #ff3b3b 0%, #ff6b00 100%)",
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-900 text-gray-300 font-sans antialiased min-h-screen p-6 relative overflow-hidden">

    <!-- background decoration -->
    <div class="absolute top-0 right-0 w-64 h-64 bg-brand-orange/5 rounded-full blur-3xl -z-10"></div>
    <div class="absolute bottom-0 left-0 w-64 h-64 bg-brand-red/5 rounded-full blur-3xl -z-10"></div>

    <div class="max-w-md mx-auto pt-4 relative z-10">
        
        <div class="flex items-center justify-between mb-8 border-b border-dark-700 pb-5">
            <h1 class="text-2xl font-display font-black text-white tracking-widest uppercase">Delivery <span class="text-brand-orange">Panel</span></h1>
            <div class="w-10 h-10 bg-dark-800 rounded-full border border-dark-700 flex items-center justify-center">
                <i data-lucide="user" class="w-5 h-5 text-gray-400"></i>
            </div>
        </div>
        
        <!-- Active Order Card -->
        <div class="bg-dark-800 p-8 rounded-3xl border border-dark-700 shadow-[0_10px_30px_rgba(0,0,0,0.5)] mb-8 relative overflow-hidden">
            <!-- decoration -->
            <div class="absolute -right-4 -bottom-4 opacity-5 text-white transform -rotate-12">
                <i data-lucide="package" class="w-40 h-40"></i>
            </div>

            <div class="relative z-10">
                <div class="flex items-center justify-between mb-4">
                    <p class="text-xs font-bold text-brand-orange mb-1 uppercase tracking-widest flex items-center gap-2">
                        <span class="relative flex h-2 w-2">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-orange opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-2 w-2 bg-brand-orange"></span>
                        </span>
                        Active Order
                    </p>
                    <span class="bg-dark-900 text-gray-400 text-[10px] font-bold px-2 py-1 rounded-md border border-dark-700">LIVE</span>
                </div>

                <h2 class="text-3xl font-display font-bold text-white tracking-wide mb-1">#RS-2026-001</h2>
                <div class="flex items-center gap-2 mt-4 text-sm text-gray-400 font-medium">
                    <i data-lucide="user" class="w-4 h-4"></i> Customer: <span class="text-white">Sahazad</span>
                </div>
                <div class="flex items-center gap-2 mt-2 text-sm text-gray-400 font-medium pb-2 border-b border-dark-700 border-dashed mb-2">
                    <i data-lucide="map-pin" class="w-4 h-4"></i> Location: <span class="text-white">Main Street, City Center</span>
                </div>
                <div class="flex items-center justify-between mt-3 text-sm text-gray-400 font-medium">
                    <span>Cash to Collect</span>
                    <span class="text-brand-orange font-bold text-lg">₹840</span>
                </div>
            </div>
        </div>

        <h3 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-4">Update Order Status</h3>

        <!-- Status Actions -->
        <div class="space-y-4">
            <button onclick="updateStatus('Kitchen')" class="w-full bg-dark-800 hover:bg-dark-700 border border-dark-700 hover:border-brand-orange p-5 rounded-2xl font-bold flex items-center justify-between text-white transition-all shadow-sm group">
                <span class="uppercase tracking-wider text-sm flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-dark-900 flex items-center justify-center text-gray-500 group-hover:text-brand-orange">1</div>
                    Mark as Cooking
                </span> 
                <i data-lucide="flame" class="w-5 h-5 text-gray-500 group-hover:text-brand-orange"></i>
            </button>

            <button onclick="updateStatus('On the Way')" class="w-full bg-dark-800 hover:bg-dark-700 border border-dark-700 hover:border-blue-500 p-5 rounded-2xl font-bold flex items-center justify-between text-white transition-all shadow-sm group">
                <span class="uppercase tracking-wider text-sm flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-dark-900 flex items-center justify-center text-gray-500 group-hover:text-blue-500">2</div>
                    Out for Delivery
                </span> 
                <i data-lucide="bike" class="w-5 h-5 text-gray-500 group-hover:text-blue-500"></i>
            </button>

            <button onclick="updateStatus('Delivered')" class="w-full bg-fire-gradient p-5 rounded-2xl font-bold flex items-center justify-between text-white transition-all shadow-[0_0_15px_rgba(255,107,0,0.3)] hover:shadow-[0_0_25px_rgba(255,107,0,0.5)] hover:-translate-y-1 active:scale-95 group">
                <span class="uppercase tracking-wider text-sm flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-black/20 flex items-center justify-center text-white">3</div>
                    Mark Delivered
                </span> 
                <i data-lucide="check-circle" class="w-6 h-6 text-white drop-shadow-md"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function updateStatus(status) {
            // This updates the central 'database' (localStorage for demo)
            localStorage.setItem('orderStatus', status);
            
            // Try to update API database if available
            try {
                // Assuming you would eventually post this to your render com backend
                console.log(`Sending status update to API: ${status}`);
            } catch(e) {}

            alert("SUCCESS: Order Status Updated to -> " + status);
        }
    </script>
</body>
</html>
