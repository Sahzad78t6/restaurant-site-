<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Menu | Royal Sweets</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
if(!localStorage.getItem("royalSweetsUser")){
window.location.href="login.html";
}
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{font-family:'Plus Jakarta Sans',sans-serif;}
.category-pill.active{background:#f97316;color:white}
.glass-morphism{background:rgba(255,255,255,.8);backdrop-filter:blur(10px)}
</style>
</head>

<body class="bg-[#F8F9FA] pb-32">

<nav class="sticky top-0 z-50 glass-morphism border-b border-gray-100 px-4 py-4">
<div class="max-w-xl mx-auto flex justify-between items-center">
<a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm border">
<i class="fa-solid fa-chevron-left"></i>
</a>
<h1 class="text-lg font-extrabold">ROYAL SWEETS</h1>
</div>
</nav>

<div class="max-w-xl mx-auto px-4 mt-6 overflow-x-auto flex gap-3 py-2">
<button onclick="filterCategory('all')" class="category-pill active px-6 py-2.5 rounded-2xl font-bold text-sm">All Items</button>
<button onclick="filterCategory('Sweets')" class="category-pill bg-white text-gray-500 px-6 py-2.5 rounded-2xl font-bold text-sm border">Sweets</button>
<button onclick="filterCategory('Snacks')" class="category-pill bg-white text-gray-500 px-6 py-2.5 rounded-2xl font-bold text-sm border">Snacks</button>
<button onclick="filterCategory('Drinks')" class="category-pill bg-white text-gray-500 px-6 py-2.5 rounded-2xl font-bold text-sm border">Drinks</button>
</div>

<div class="max-w-xl mx-auto px-4 mt-6">
<input id="searchInput" onkeyup="searchMenu()" placeholder="Search item..."
class="w-full bg-white py-4 px-4 rounded-2xl shadow-sm outline-none">
</div>

<!-- MENU CONTAINER -->
<main class="max-w-xl mx-auto px-4 mt-8 space-y-4" id="menuContainer"></main>

<!-- CART BAR -->
<div id="cartBar" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-lg bg-gray-900 rounded-[2rem] p-4 flex justify-between translate-y-32">

<div class="flex items-center gap-4">
<i class="fa-solid fa-bag-shopping text-orange-500 text-2xl"></i>
<p class="text-white font-bold">₹<span id="totalPrice">0</span></p>
</div>

<button onclick="window.location.href='checkout.html'"
class="bg-orange-500 text-white px-8 py-3 rounded-xl font-black">
CHECKOUT
</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem('activeCart')) || [];

/* LOAD MENU FROM DATABASE */
async function loadMenu(){

const res = await fetch("http://localhost:5000/api/menu");
const menu = await res.json();

const container=document.getElementById("menuContainer");
container.innerHTML="";

menu.forEach(item=>{

container.innerHTML+=`

<div class="menu-item bg-white p-4 rounded-2xl shadow-sm flex gap-4"
data-category="${item.category}">

<img src="${item.image}" class="w-24 h-24 rounded-xl object-cover">

<div class="flex-1">

<div class="flex justify-between">

<h3 class="font-bold item-name">${item.name}</h3>

<span class="text-orange-500 font-bold">₹${item.price}</span>

</div>

<p class="text-xs text-gray-400">${item.description}</p>

<div class="mt-3 flex justify-end">

<button onclick="addToCart('${item.name}',${item.price})"
class="bg-orange-500 text-white px-4 py-1 rounded-lg text-sm">
Add
</button>

</div>

</div>
</div>

`;

});

}

function addToCart(name,price){

cart.push({name,price});

localStorage.setItem("activeCart",JSON.stringify(cart));

updateCartBar();

}

function updateCartBar(){

const bar=document.getElementById("cartBar");

if(cart.length>0){

bar.classList.remove("translate-y-32");

const total=cart.reduce((s,i)=>s+i.price,0);

document.getElementById("totalPrice").innerText=total;

}else{

bar.classList.add("translate-y-32");

}

}

function searchMenu(){

let input=document.getElementById("searchInput").value.toLowerCase();

let items=document.getElementsByClassName("menu-item");

for(let i=0;i<items.length;i++){

let name=items[i].querySelector(".item-name").innerText.toLowerCase();

items[i].style.display=name.includes(input)?"flex":"none";

}

}

function filterCategory(cat){

let items=document.getElementsByClassName("menu-item");

for(let i=0;i<items.length;i++){

if(cat==="all") items[i].style.display="flex";

else items[i].style.display=items[i].dataset.category===cat?"flex":"none";

}

}

window.onload=()=>{

loadMenu();
updateCartBar();

}

</script>

</body>
</html>
