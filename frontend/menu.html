<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Menu | Royal Sweets</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
if(!localStorage.getItem("royalSweetsUser")){
window.location.href="login.html";
}
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{font-family:'Plus Jakarta Sans',sans-serif;}
.category-pill.active{background:#f97316;color:white}
.glass-morphism{background:rgba(255,255,255,.8);backdrop-filter:blur(10px)}
</style>
</head>

<body class="bg-slate-50 pb-32">

<!-- TOP NAV -->
<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 px-6 py-5 shadow-sm">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
        <a href="index.html" class="w-12 h-12 flex items-center justify-center rounded-full bg-slate-50 text-slate-700 shadow-sm border border-slate-200 hover:bg-orange-50 hover:text-orange-500 hover:border-orange-200 transition-all duration-300">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1 class="text-2xl font-black text-slate-800 tracking-tight">Royal Menu</h1>
        <div class="w-12 h-12 rounded-full flex items-center justify-center">
            <!-- Empty space for flexbox centering -->
        </div>
    </div>
</nav>

<!-- SEARCH & FILTER TABS -->
<div class="max-w-4xl mx-auto px-6 mt-8">
    <div class="relative w-full shadow-sm rounded-2xl group focus-within:ring-4 focus-within:ring-orange-500/20 transition-all">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-orange-500 transition-colors"></i>
        <input id="searchInput" onkeyup="searchMenu()" placeholder="Search your cravings..."
            class="w-full bg-white border border-slate-200 py-4 pl-14 pr-6 rounded-2xl outline-none text-slate-700 font-medium placeholder:text-slate-400 focus:border-orange-500 transition-colors text-lg">
    </div>

    <!-- Pilled Category Filters -->
    <div class="flex gap-4 mt-8 pb-3 overflow-x-auto hide-scrollbar snap-x">
        <button onclick="filterCategory('all')" class="category-pill active shrink-0 px-8 py-3.5 rounded-full font-bold text-sm tracking-wide shadow-sm border transition-all duration-300 snap-center">All Items</button>
        <button onclick="filterCategory('Sweets')" class="category-pill bg-white text-slate-500 border-slate-200 hover:border-orange-300 hover:text-orange-500 shrink-0 px-8 py-3.5 rounded-full font-bold text-sm tracking-wide shadow-sm border transition-all duration-300 snap-center">Sweets</button>
        <button onclick="filterCategory('Snacks')" class="category-pill bg-white text-slate-500 border-slate-200 hover:border-orange-300 hover:text-orange-500 shrink-0 px-8 py-3.5 rounded-full font-bold text-sm tracking-wide shadow-sm border transition-all duration-300 snap-center">Snacks</button>
        <button onclick="filterCategory('Drinks')" class="category-pill bg-white text-slate-500 border-slate-200 hover:border-orange-300 hover:text-orange-500 shrink-0 px-8 py-3.5 rounded-full font-bold text-sm tracking-wide shadow-sm border transition-all duration-300 snap-center">Drinks</button>
    </div>
</div>

<!-- MENU CONTAINER -->
<main class="max-w-4xl mx-auto px-6 mt-8 grid grid-cols-1 md:grid-cols-2 gap-6" id="menuContainer"></main>

<!-- FLOATING CART BAR -->
<div id="cartBar" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-2xl bg-slate-900 rounded-[2rem] p-4 pl-8 flex justify-between items-center shadow-2xl shadow-slate-900/40 translate-y-40 transition-transform duration-500 z-50">
    <div class="flex items-center gap-5">
        <div class="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center relative">
            <i class="fa-solid fa-basket-shopping text-orange-400 text-xl"></i>
            <span class="absolute -top-1 -right-1 flex h-4 w-4">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-4 w-4 bg-orange-500 border-2 border-slate-900"></span>
            </span>
        </div>
        <div class="flex flex-col">
            <span class="text-slate-400 text-xs font-bold uppercase tracking-wider">Total Amount</span>
            <p class="text-white font-black text-2xl tracking-tight leading-none">₹<span id="totalPrice">0</span></p>
        </div>
    </div>

    <button onclick="window.location.href='checkout.html'"
        class="bg-gradient-to-r from-orange-500 to-orange-600 text-white px-8 py-4 rounded-2xl font-black text-sm tracking-wide shadow-lg shadow-orange-500/25 hover:shadow-orange-500/40 hover:-translate-y-0.5 active:scale-95 transition-all duration-300 flex items-center gap-3">
        CHECKOUT <i class="fa-solid fa-arrow-right text-xs"></i>
    </button>
</div>

<script>

let cart = JSON.parse(localStorage.getItem('activeCart')) || [];

/* LOAD MENU FROM DATABASE */
async function loadMenu(){

const res = await fetch("https://restaurant-site-8y41.onrender.com/api/menu");
const menu = await res.json();

const container=document.getElementById("menuContainer");
container.innerHTML="";

menu.forEach(item=>{

container.innerHTML+=`
<div class="menu-item group bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl hover:shadow-orange-500/5 hover:border-orange-100 transition-all duration-300 flex flex-col sm:flex-row gap-5"
    data-category="${item.category}">

    <div class="relative w-full sm:w-32 h-40 sm:h-32 rounded-2xl overflow-hidden shrink-0">
        <div class="absolute inset-0 bg-slate-900/10 group-hover:bg-transparent transition-colors z-10 duration-300"></div>
        <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
    </div>

    <div class="flex-1 flex flex-col justify-between py-1">
        <div>
            <div class="flex justify-between items-start gap-3 mb-2">
                <h3 class="font-extrabold text-lg text-slate-800 tracking-tight leading-tight item-name group-hover:text-orange-600 transition-colors">${item.name}</h3>
                <span class="text-orange-500 font-black text-lg">₹${item.price}</span>
            </div>
            <p class="text-sm text-slate-500 leading-relaxed line-clamp-2">${item.description}</p>
        </div>

        <div class="mt-4 flex justify-between items-center">
            <span class="text-[10px] uppercase font-bold tracking-widest text-slate-400 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">
                ${item.category}
            </span>
            <button onclick="addToCart('${item.name}',${item.price})"
                class="bg-orange-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md shadow-orange-500/20 hover:bg-orange-600 active:scale-95 transition-all flex items-center gap-2">
                <i class="fa-solid fa-plus text-xs"></i> Add
            </button>
        </div>
    </div>
</div>
`;

});

}

function addToCart(name,price){

cart.push({name,price});

localStorage.setItem("activeCart",JSON.stringify(cart));

updateCartBar();

}

function updateCartBar(){

const bar=document.getElementById("cartBar");

if(cart.length>0){

bar.classList.remove("translate-y-32");

const total=cart.reduce((s,i)=>s+i.price,0);

document.getElementById("totalPrice").innerText=total;

}else{

bar.classList.add("translate-y-32");

}

}

function searchMenu(){

let input=document.getElementById("searchInput").value.toLowerCase();

let items=document.getElementsByClassName("menu-item");

for(let i=0;i<items.length;i++){

let name=items[i].querySelector(".item-name").innerText.toLowerCase();

items[i].style.display=name.includes(input)?"flex":"none";

}

}

function filterCategory(cat){

let items=document.getElementsByClassName("menu-item");
let pills=document.getElementsByClassName("category-pill");

for(let i=0;i<items.length;i++){
if(cat==="all") items[i].style.display="flex";
else items[i].style.display=items[i].dataset.category===cat?"flex":"none";
}

for(let i=0;i<pills.length;i++){
pills[i].classList.remove("active");
pills[i].classList.remove("bg-[#f97316]");
pills[i].classList.remove("text-white");
pills[i].classList.add("bg-white");
pills[i].classList.add("text-gray-500");

if((cat==="all" && i===0) || (cat==="Sweets" && i===1) || (cat==="Snacks" && i===2) || (cat==="Drinks" && i===3)) {
pills[i].classList.add("active");
pills[i].classList.add("bg-[#f97316]");
pills[i].classList.add("text-white");
pills[i].classList.remove("bg-white");
pills[i].classList.remove("text-gray-500");
}
}
}

window.onload=async ()=>{

await loadMenu();
updateCartBar();

// Check for category filter from URL parameter
const urlParams = new URLSearchParams(window.location.search);
const initialCategory = urlParams.get('category');
if(initialCategory) {
    filterCategory(initialCategory);
}

}

</script>

</body>
</html>
