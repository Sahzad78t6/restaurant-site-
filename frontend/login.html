<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Royal Sweets</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }
</style>

</head>

<body class="bg-[#F8F9FA] min-h-screen flex flex-col items-center justify-center p-4">

<a href="index.html" class="fixed top-8 left-8 w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm border border-gray-100">
<i class="fa-solid fa-chevron-left"></i>
</a>

<div class="w-full max-w-md bg-white rounded-[3rem] p-10 shadow-xl border border-gray-50">

<div class="text-center mb-10">

<div class="w-16 h-16 bg-orange-500 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-2xl shadow-lg">
<i class="fa-solid fa-unlock-keyhole"></i>
</div>

<h2 class="text-3xl font-black text-gray-800 uppercase italic tracking-tighter">
Welcome Back
</h2>

<p class="text-gray-400 text-sm font-bold mt-1">
Login to access your orders
</p>

</div>

<form id="loginForm" class="space-y-4">

<input id="email" type="email" placeholder="Email Address"
class="w-full bg-gray-50 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500">

<input id="password" type="password" placeholder="Password"
class="w-full bg-gray-50 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500">

<button
type="submit"
class="w-full bg-orange-500 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">

Login Account

</button>

</form>

<p class="text-center mt-8 text-sm font-bold text-gray-500">
New here?
<a href="signup.html" class="text-orange-500 underline">
Create an account
</a>
</p>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault();

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

const res = await fetch("http://localhost:5000/api/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email,
password
})

});

const data = await res.json();

if(res.status!==200){

alert(data.message);
return;

}

/* SAVE USER */

localStorage.setItem("royalSweetsUser",JSON.stringify(data));


/* ROLE BASED REDIRECT */

if(data.role==="delivery"){

window.location.href="delivery-dashboard.html";

}

else if(data.role==="admin"){

window.location.href="admin-dashboard.html";

}

else{

window.location.href="menu.html";

}

}catch(err){

console.log(err);

alert("Login failed");

}

});

</script>

</body>
</html>
