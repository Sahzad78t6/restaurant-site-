<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Royal Sweets</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }
</style>

</head>

<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">

<a href="index.html" class="absolute top-8 left-8 w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors z-10 hover:-translate-x-1 duration-300">
    <i class="fa-solid fa-arrow-left text-slate-600"></i>
</a>

<!-- Decorative bg elements -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-orange-500/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-orange-400/10 rounded-full blur-3xl pointer-events-none"></div>

<div class="w-full max-w-[420px] relative z-10">
    <div class="bg-white/80 backdrop-blur-xl rounded-[2.5rem] p-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white">
        
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-gradient-to-br from-orange-500 to-orange-600 rounded-2xl mx-auto mb-6 flex items-center justify-center text-white text-2xl shadow-lg shadow-orange-500/30 transform -rotate-6 group hover:rotate-0 transition-all duration-300">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight">
                Welcome back
            </h2>
            <p class="text-slate-500 font-medium mt-2">
                Please enter your details to sign in.
            </p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div class="space-y-4">
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-orange-500 transition-colors z-10">
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                    <input id="email" type="email" placeholder="Email Address" required
                        class="relative w-full bg-slate-50/50 border border-slate-200 py-4 pl-12 pr-4 rounded-xl outline-none focus:bg-white focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10 transition-all font-medium text-slate-700 placeholder:text-slate-400">
                </div>

                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-orange-500 transition-colors z-10">
                        <i class="fa-solid fa-lock text-[14px]"></i>
                    </div>
                    <input id="password" type="password" placeholder="Password" required
                        class="relative w-full bg-slate-50/50 border border-slate-200 py-4 pl-12 pr-4 rounded-xl outline-none focus:bg-white focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10 transition-all font-medium text-slate-700 placeholder:text-slate-400">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-slate-900 border border-transparent text-white py-4 rounded-xl font-bold tracking-wide shadow-md hover:bg-slate-800 active:scale-[0.98] transition-all flex justify-center items-center gap-2 mt-2">
                Sign In <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>
        </form>

        <p class="text-center mt-8 text-sm font-medium text-slate-500">
            Don't have an account? 
            <a href="signup.html" class="text-orange-600 font-bold hover:underline underline-offset-4 decoration-2 transition-all">
                Sign up
            </a>
        </p>
    </div>
</div>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault();

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

const res = await fetch("https://restaurant-site-8y41.onrender.com/api/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email,
password
})

});

const data = await res.json();

if(res.status!==200){

alert(data.message);
return;

}

/* SAVE USER */

localStorage.setItem("royalSweetsUser",JSON.stringify(data));


/* ROLE BASED REDIRECT */

if(data.role==="delivery"){

window.location.href="delivery-dashboard.html";

}

else if(data.role==="admin"){

window.location.href="admin-dashboard.html";

}

else{

window.location.href="menu.html";

}

}catch(err){

console.log(err);

alert("Login failed");

}

});

</script>

</body>
</html>
