<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Royal Sweets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .status-pulse { animation: pulse-orange 2s infinite; }
        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <!-- TOP NAV -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 px-6 py-5 shadow-sm mb-8">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <a href="index.html" class="w-12 h-12 flex items-center justify-center rounded-full bg-slate-50 text-slate-700 shadow-sm border border-slate-200 hover:bg-orange-50 hover:text-orange-500 hover:border-orange-200 transition-all duration-300">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="text-xl font-black text-slate-800 tracking-tight uppercase">My Orders</h1>
            <div class="w-12 h-12"></div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 mt-8">
        
        <div id="activeOrderSection" class="hidden mb-12">
            <div class="flex items-center gap-3 mb-4">
                <i class="fa-solid fa-clock-rotate-left text-orange-500"></i>
                <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest">Ongoing Order</h2>
            </div>
            
            <div class="bg-gradient-to-br from-orange-500 to-orange-600 rounded-[2rem] p-6 sm:p-8 text-white shadow-xl shadow-orange-500/30 status-pulse border border-orange-400 relative overflow-hidden">
                <i class="fa-solid fa-truck-fast text-8xl absolute -right-4 -bottom-4 opacity-10 transform -rotate-12"></i>
                <div class="relative z-10">
                    <p class="text-xs font-bold text-orange-100 uppercase tracking-widest mb-1">Current Status</p>
                    <h3 id="liveStatus" class="text-3xl font-black italic tracking-tight mb-8">Preparing...</h3>
                    <button onclick="window.location.href='status.html'" class="w-full bg-white text-orange-600 py-4 rounded-xl font-black text-sm tracking-wide shadow-lg hover:shadow-xl hover:-translate-y-0.5 active:scale-95 transition-all flex justify-center items-center gap-2">
                        Track Details <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3 mb-6">
            <i class="fa-solid fa-box-archive text-slate-400"></i>
            <h2 class="text-sm font-black text-slate-600 uppercase tracking-widest">Order History</h2>
        </div>
        
        <div id="historyList" class="space-y-5">
            <div id="emptyHistory" class="text-center py-20 bg-white rounded-[2rem] border border-dashed border-slate-200 shadow-sm">
                <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300 text-3xl">
                    <i class="fa-solid fa-box-open"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-700 tracking-tight mb-2">No past orders</h3>
                <p class="text-slate-400 font-medium">Looks like you haven't ordered anything yet.</p>
                <button onclick="window.location.href='menu.html'" class="mt-6 bg-orange-50 text-orange-600 px-6 py-3 rounded-xl font-bold text-sm hover:bg-orange-100 transition-colors">
                    Browse Menu
                </button>
            </div>
        </div>

    </main>

  <script>

const user = JSON.parse(localStorage.getItem("royalSweetsUser"));

if(!user){
alert("Please login first");
window.location.href="login.html";
}


// LOAD USER ORDERS FROM DATABASE

async function loadOrders(){

try{

const res = await fetch(`https://restaurant-site-8y41.onrender.com/api/orders/user/${user._id}`);

const orders = await res.json();

const historyContainer = document.getElementById("historyList");

const empty = document.getElementById("emptyHistory");


if(orders.length === 0){

empty.style.display="block";

return;

}

empty.style.display="none";

orders.reverse().forEach(order=>{

historyContainer.innerHTML += `
<div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow flex flex-col gap-4 group">
    <div class="flex justify-between items-start">
        <div>
            <span class="inline-block bg-slate-50 text-slate-500 border border-slate-100 text-[10px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-lg mb-3">
                ${new Date(order.date).toLocaleDateString()}
            </span>
            <h4 class="font-extrabold text-slate-800 text-lg leading-tight group-hover:text-orange-600 transition-colors">
                ${order.items.length} Items Ordered
            </h4>
        </div>
        <span class="text-xl font-black text-orange-500 bg-orange-50 px-3 py-1.5 rounded-xl border border-orange-100">
            ₹${order.total}
        </span>
    </div>

    <div class="flex justify-between items-center mt-2 pt-4 border-t border-slate-50">
        <div class="flex items-center gap-2">
            <div class="w-2.5 h-2.5 rounded-full ${order.status.toLowerCase() === 'delivered' ? 'bg-green-500 shadow-sm shadow-green-500/40' : 'bg-orange-500 shadow-sm shadow-orange-500/40 animate-pulse'}"></div>
            <p class="text-sm font-bold text-slate-600 tracking-wide">
                ${order.status}
            </p>
        </div>

        <button onclick="window.location.href='status.html?id=${order._id}'"
            class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider shadow-md hover:bg-slate-800 active:scale-95 transition-all flex items-center gap-2">
            Track <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>
</div>
`;

});

}catch(err){

console.log(err);

}

}


window.onload = loadOrders;

</script>
</body>
</html>
