<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Royal Sweets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .status-pulse { animation: pulse-orange 2s infinite; }
        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }
    </style>
</head>
<body class="bg-[#F8F9FA] pb-10">

    <nav class="bg-white border-b border-gray-100 p-6 sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex items-center gap-4">
            <a href="index.html" class="text-gray-400"><i class="fa-solid fa-arrow-left"></i></a>
            <h1 class="text-xl font-black uppercase tracking-tight">My Orders</h1>
        </div>
    </nav>
<a href="track.html?orderId=${order._id}">
Track Live
</a>
    <main class="max-w-xl mx-auto px-4 mt-8">
        
        <div id="activeOrderSection" class="hidden mb-12">
            <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em] mb-4">Ongoing Order</h2>
            <div class="bg-orange-600 rounded-[2rem] p-6 text-white shadow-xl status-pulse border-b-4 border-orange-800">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-[10px] font-bold opacity-70 uppercase">Current Status</p>
                        <h3 id="liveStatus" class="text-2xl font-black italic uppercase">Preparing...</h3>
                    </div>
                    <i class="fa-solid fa-truck-fast text-3xl opacity-30"></i>
                </div>
                <button onclick="window.location.href='status.html'" class="w-full bg-white text-orange-600 py-3 rounded-xl font-black text-sm uppercase">Track Details</button>
            </div>
        </div>

        <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em] mb-4">Past Orders</h2>
        <div id="historyList" class="space-y-4">
            <div id="emptyHistory" class="text-center py-20 opacity-30">
                <i class="fa-solid fa-box-open text-6xl mb-4"></i>
                <p class="font-bold">No past orders found</p>
            </div>
        </div>

    </main>

  <script>

const user = JSON.parse(localStorage.getItem("royalSweetsUser"));

if(!user){
alert("Please login first");
window.location.href="login.html";
}


// LOAD USER ORDERS FROM DATABASE

async function loadOrders(){

try{

const res = await fetch(`https://restaurant-site-production.up.railway.app/api/orders/user/${user._id}`);

const orders = await res.json();

const historyContainer = document.getElementById("historyList");

const empty = document.getElementById("emptyHistory");


if(orders.length === 0){

empty.style.display="block";

return;

}

empty.style.display="none";

orders.reverse().forEach(order=>{

historyContainer.innerHTML += `

<div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm flex justify-between items-center">

<div>

<p class="text-[10px] font-black text-gray-400 uppercase">
${new Date(order.date).toLocaleDateString()}
</p>

<h4 class="font-bold text-gray-800">
${order.items.length} Items Ordered
</h4>

<p class="text-sm font-bold text-orange-500 mt-1">
₹${order.total}
</p>

<p class="text-xs text-gray-400 mt-1">
Status: ${order.status}
</p>

</div>

<button onclick="window.location.href='status.html?id=${order._id}'"

class="bg-gray-50 text-gray-400 px-4 py-2 rounded-xl text-[10px] font-bold uppercase">

Track

</button>

</div>

`;

});

}catch(err){

console.log(err);

}

}


window.onload = loadOrders;

</script>
</body>
</html>
