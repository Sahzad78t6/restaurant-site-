<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Royal Sweets</title>
    <!-- Favicon -->
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta property="og:image" content="logo.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#ff6b00',
                            dark: '#0a0a0a'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #f3f4f6;
        }

        .order-card {
            transition: all 0.2s ease-in-out;
        }

        .order-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 800;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-Pending {
            background-color: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .status-Accepted {
            background-color: #f3f4f6;
            color: #4b5563;
            border: 1px solid #e5e7eb;
        }

        .status-Kitchen {
            background-color: #fef3c7;
            color: #d97706;
            border: 1px solid #fde68a;
        }

        .status-OnWay {
            background-color: #dbeafe;
            color: #2563eb;
            border: 1px solid #bfdbfe;
        }

        .status-Arrived {
            background-color: #dcfce3;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .status-Delivered {
            background-color: #dcfce3;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .status-Cancelled {
            background-color: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen">
    <!-- Video Preloader -->
    <div id="preloader" class="fixed inset-0 z-[9999] bg-black flex items-center justify-center transition-opacity duration-500 overflow-hidden">
        <video id="preloader-video" autoplay muted loop playsinline class="w-full h-full object-cover">
            <source src="loading.mp4" type="video/mp4">
        </video>
    </div>


    <!-- Top Navigation -->
    <nav class="sticky top-0 z-50 glass-header px-6 py-4 mb-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 bg-brand-dark rounded-xl flex items-center justify-center text-brand-orange shadow-md">
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight text-gray-900 uppercase">Admin Portal</h1>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-none">Management
                        Dashboard</p>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="window.location.href='tracker.html'"
                    class="flex items-center gap-2 bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white px-4 py-2 rounded-lg text-xs font-bold uppercase transition border border-blue-200 shadow-sm">
                    <i data-lucide="bar-chart-2" class="w-3.5 h-3.5"></i> Analytics Tracker
                </button>
                <button onclick="window.location.href='menumanage.html'"
                    class="flex items-center gap-2 bg-brand-orange/10 text-brand-orange hover:bg-brand-orange hover:text-white px-4 py-2 rounded-lg text-xs font-bold uppercase transition border border-brand-orange/20 shadow-sm">
                    <i data-lucide="utensils" class="w-3.5 h-3.5"></i> Menu Manager
                </button>
                <button onclick="loadStatsAndOrders()"
                    class="flex items-center gap-2 bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg text-xs font-bold uppercase hover:bg-gray-50 transition shadow-sm">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Refresh
                </button>
                <button onclick="logoutAdmin()"
                    class="flex items-center gap-2 bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2 rounded-lg text-xs font-bold uppercase transition">
                    <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-20">

        <!-- Stats Summary -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center shrink-0">
                    <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Total Orders</p>
                    <h3 id="stat-total" class="text-2xl font-black text-gray-800">0</h3>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                <div
                    class="w-12 h-12 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center shrink-0">
                    <i data-lucide="clock" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Active Orders</p>
                    <h3 id="stat-active" class="text-2xl font-black text-gray-800">0</h3>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                <div
                    class="w-12 h-12 rounded-full bg-green-50 text-green-500 flex items-center justify-center shrink-0">
                    <i data-lucide="indian-rupee" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Revenue</p>
                    <h3 id="stat-revenue" class="text-2xl font-black text-gray-800">₹0</h3>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-red-50 text-red-500 flex items-center justify-center shrink-0">
                    <i data-lucide="x-circle" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Cancelled</p>
                    <h3 id="stat-cancelled" class="text-2xl font-black text-gray-800">0</h3>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div
            class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 bg-white p-3 rounded-2xl border border-gray-200 shadow-sm">
            <div class="flex items-center gap-2 pl-2">
                <i data-lucide="filter" class="w-4 h-4 text-gray-400"></i>
                <span class="text-xs font-bold text-gray-500 uppercase">Filter Status:</span>
            </div>
            <div class="flex gap-2 overflow-x-auto w-full sm:w-auto pb-1 sm:pb-0 hide-scroll">
                <button onclick="filterOrders('All')"
                    class="filter-btn active px-4 py-1.5 rounded-lg text-xs font-bold bg-gray-900 text-white whitespace-nowrap">All</button>
                <button onclick="filterOrders('Pending')"
                    class="filter-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 whitespace-nowrap">Pending</button>
                <button onclick="filterOrders('Active')"
                    class="filter-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 whitespace-nowrap">Active</button>
                <button onclick="filterOrders('Completed')"
                    class="filter-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 whitespace-nowrap">Completed</button>
                <button onclick="filterOrders('Cancelled')"
                    class="filter-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 whitespace-nowrap">Cancelled</button>
            </div>
        </div>

        <!-- Orders Table/Grid -->
        <div id="loader" class="py-20 flex flex-col items-center justify-center text-gray-400">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4 text-brand-orange"></i>
            <p class="text-sm font-bold tracking-widest uppercase">Loading Server Data...</p>
        </div>

        <div id="noOrders" class="hidden py-20 bg-white rounded-3xl border border-gray-200 border-dashed text-center">
            <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300">
                <i data-lucide="inbox" class="w-10 h-10"></i>
            </div>
            <h3 class="text-xl font-black text-gray-800 mb-1">No Orders Found</h3>
            <p class="text-sm font-medium text-gray-500">There are no orders matching this filter.</p>
        </div>

        <div id="ordersContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Rendered Orders Go Here -->
        </div>

    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Authenticate via the login payload stored in localStorage
        const user = JSON.parse(localStorage.getItem("royalSweetsUser"));
        if (!user || user.role !== "admin") {
            alert("Unauthorized Access. Admin privileges required.");
            window.location.href = "login.html";
        }

        function logoutAdmin() {
            localStorage.removeItem("royalSweetsUser");
            window.location.href = "login.html";
        }

        let allOrdersData = [];
        let currentFilter = 'All';

        async function loadStatsAndOrders() {
            try {
                const loader = document.getElementById("loader");
                const container = document.getElementById("ordersContainer");

                loader.classList.remove('hidden');
                container.classList.add('hidden');
                document.getElementById('noOrders').classList.add('hidden');

                const res = await fetch("https://restaurant-site-8y41.onrender.com/api/orders");
                allOrdersData = await res.json();

                // Process Stats
                let totalRev = 0;
                let activeCount = 0;
                let cancelledCount = 0;

                allOrdersData.forEach(order => {
                    if (order.status !== "Cancelled") {
                        totalRev += order.total || 0;
                    }
                    if (order.status === "Cancelled") {
                        cancelledCount++;
                    }
                    const s = (order.status || "").toLowerCase();
                    if (s !== "delivered" && s !== "cancelled" && s !== "arrived") {
                        activeCount++;
                    }
                });

                document.getElementById("stat-total").innerText = allOrdersData.length;
                document.getElementById("stat-revenue").innerText = `₹${totalRev.toLocaleString()}`;
                document.getElementById("stat-active").innerText = activeCount;
                document.getElementById("stat-cancelled").innerText = cancelledCount;

                renderOrders();
            } catch (err) {
                console.error("Failed to load admin data", err);
                alert("Failed to connect to server. Check console.");
            }
        }

        function filterOrders(filterType) {
            currentFilter = filterType;

            // Update Active Tab Style
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.innerText === filterType) {
                    btn.classList.replace('bg-gray-100', 'bg-gray-900');
                    btn.classList.replace('text-gray-600', 'text-white');
                } else {
                    btn.classList.replace('bg-gray-900', 'bg-gray-100');
                    btn.classList.replace('text-white', 'text-gray-600');
                }
            });

            renderOrders();
        }

        function renderOrders() {
            const container = document.getElementById("ordersContainer");
            const emptyState = document.getElementById("noOrders");
            const loader = document.getElementById("loader");

            container.innerHTML = "";
            loader.classList.add("hidden");

            let filtered = allOrdersData.filter(order => {
                const s = (order.status || "").toLowerCase();
                if (currentFilter === 'All') return true;
                if (currentFilter === 'Pending') return s === 'pending';
                if (currentFilter === 'Cancelled') return s === 'cancelled';
                if (currentFilter === 'Completed') return s === 'arrived' || s === 'delivered';
                if (currentFilter === 'Active') return s !== 'cancelled' && s !== 'delivered' && s !== 'arrived';
                return true;
            });

            if (filtered.length === 0) {
                container.classList.add("hidden");
                emptyState.classList.remove("hidden");
                return;
            }

            container.classList.remove("hidden");
            emptyState.classList.add("hidden");

            // Sort newest first
            filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(order => {
                const date = new Date(order.createdAt).toLocaleString(undefined, {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                const safeStatus = order.status ? order.status.replace(/\s+/g, '') : 'Pending';

                container.insertAdjacentHTML('beforeend', `
                    <div class="order-card bg-white p-5 rounded-2xl border border-gray-200 flex flex-col h-full shadow-sm relative">
                        <!-- Top Header -->
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="status-badge status-${safeStatus}">
                                    ${order.status || 'Pending'}
                                </span>
                                <h3 class="font-black text-gray-900 text-lg mt-2">#${String(order._id).slice(-6)}</h3>
                                <p class="text-[10px] uppercase font-bold text-gray-400 tracking-widest"><i data-lucide="clock" class="w-3 h-3 inline pb-0.5"></i> ${date}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-xl font-black text-brand-orange">₹${order.total}</span>
                                <p class="text-[10px] font-bold ${order.paymentCollected ? 'text-green-500' : 'text-red-500'} uppercase">
                                    ${order.paymentMethod || 'COD'} ${order.paymentCollected ? '<i data-lucide="check" class="w-3 h-3 inline"></i> Paid' : 'Unpaid'}
                                </p>
                            </div>
                        </div>

                        <!-- Customer Info -->
                        <div class="bg-gray-50 rounded-xl p-3 mb-4 text-xs">
                            <div class="flex items-center gap-2 mb-2 font-bold text-gray-700">
                                <i data-lucide="phone" class="w-3.5 h-3.5 text-gray-400"></i>
                                ${order.phone}
                            </div>
                            <div class="flex items-start gap-2 text-gray-600 font-medium">
                                <i data-lucide="map-pin" class="w-3.5 h-3.5 text-gray-400 shrink-0 mt-0.5"></i>
                                <span class="line-clamp-2">${order.address}</span>
                            </div>
                            ${order.deliveryBoyName ? `
                            <div class="flex items-center gap-2 mt-2 pt-2 border-t border-gray-200 font-bold text-blue-600">
                                <i data-lucide="user-check" class="w-3.5 h-3.5"></i>
                                Claimed By: ${order.deliveryBoyName}
                            </div>
                            ` : ''}
                        </div>

                        <!-- Items -->
                        <div class="mb-5 flex-grow">
                            <p class="text-[10px] font-black tracking-widest text-gray-400 uppercase mb-2 border-b border-gray-100 pb-1">Order Items (${order.items.length})</p>
                            <div class="space-y-1.5 max-h-24 overflow-y-auto pr-2 custom-scrollbar">
                                ${order.items.map(item => `
                                    <div class="flex justify-between text-xs items-center">
                                        <span class="font-bold text-gray-700 truncate mr-2">${item.name}</span>
                                        <span class="text-gray-400 font-black shrink-0">x${item.qty || 1}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="mt-auto grid grid-cols-2 gap-2">
                            ${(order.status !== 'Cancelled' && order.status !== 'Delivered') ? `
                                <button onclick="cancelOrderFromAdmin('${order._id}')" class="bg-red-50 text-red-600 hover:bg-red-500 hover:text-white border border-red-100 py-2.5 rounded-xl text-[10px] font-black uppercase transition-colors flex items-center justify-center gap-1">
                                    <i data-lucide="ban" class="w-3.5 h-3.5"></i> Cancel
                                </button>
                                <button onclick="markAsDelivered('${order._id}', ${order.paymentCollected})" class="bg-green-50 text-green-600 hover:bg-green-500 hover:text-white border border-green-100 py-2.5 rounded-xl text-[10px] font-black uppercase transition-colors flex items-center justify-center gap-1">
                                    <i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Delivered
                                </button>
                            ` : `
                                <button disabled class="col-span-2 bg-gray-100 text-gray-400 py-2.5 rounded-xl text-[10px] font-black uppercase flex items-center justify-center gap-1 cursor-not-allowed">
                                    <i data-lucide="lock" class="w-3.5 h-3.5"></i> Order Closed
                                </button>
                            `}
                        </div>
                    </div>
                `);
            });
            lucide.createIcons();
        }

        async function cancelOrderFromAdmin(orderId) {
            const reason = prompt("Enter cancellation reason (Optional):");
            if (reason === null) return;

            try {
                const res = await fetch(`https://restaurant-site-8y41.onrender.com/api/orders/cancel/${orderId}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ reason: reason || "Cancelled by Admin" })
                });
                const data = await res.json();
                if (data.success) {
                    loadStatsAndOrders();
                } else {
                    alert(data.message || "Failed to cancel.");
                }
            } catch (e) {
                console.error("Cancellation Failed", e);
                alert("Network error while cancelling.");
            }
        }

        async function markAsDelivered(orderId, isPaid) {
            if (!isPaid) {
                const c = confirm("Payment is not marked as collected! Are you sure you want to mark this as delivered anyway?");
                if (!c) return;
            } else {
                const c = confirm("Mark order as officially delivered and close it?");
                if (!c) return;
            }

            try {
                const res = await fetch(`https://restaurant-site-8y41.onrender.com/api/orders/status/${orderId}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status: "Delivered" })
                });
                const data = await res.json();
                if (data.success) {
                    loadStatsAndOrders();
                } else {
                    alert("Failed to update status.");
                }
            } catch (e) {
                console.error("Status Update Failed", e);
                alert("Network error.");
            }
        }

        // INIT
        window.onload = loadStatsAndOrders;
        // Auto refresh every 60 seconds
        setInterval(loadStatsAndOrders, 60000);

    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .hide-scroll::-webkit-scrollbar {
            display: none;
        }

        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

    <!-- Preloader Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Set correct video for device
            const preloaderVideo = document.getElementById('preloader-video');
            if (preloaderVideo) {
                const isMobile = window.innerWidth < 768;
                const videoSrc = isMobile ? 'phone.mp4' : 'loading.mp4';
                preloaderVideo.src = videoSrc;
                preloaderVideo.load();
            }

            document.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', function(e) {
                    const href = this.getAttribute('href');
                    if (href && href.endsWith('.html') && !href.startsWith('#') && !this.hasAttribute('target') && !href.includes('mailto:') && !href.includes('tel:')) {
                        e.preventDefault();
                        const preloader = document.getElementById('preloader');
                        if (preloader) {
                            preloader.style.display = 'flex';
                            setTimeout(() => preloader.style.opacity = '1', 10);
                            setTimeout(() => window.location.href = href, 1500); // Fixed 1.5s transition
                        } else {
                            window.location.href = href;
                        }
                    }
                });
            });
        });

        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 500);
                }, 1500); // Fixed 1.5s load time
            }
        });
    </script>

</body>

</html>
