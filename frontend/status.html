<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order | Royal Sweets</title>
    <!-- Favicon -->
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta property="og:image" content="logo.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#ff3b3b',
                            darkred: '#8b0000',
                            orange: '#ff6b00',
                        },
                        dark: {
                            900: '#0a0a0a',
                            800: '#141414',
                            700: '#1f1f1f',
                        }
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        display: ['Oswald', 'sans-serif'],
                    },
                    backgroundImage: {
                        'fire-gradient': "linear-gradient(135deg, #ff3b3b 0%, #ff6b00 100%)",
                    }
                }
            }
        }
    </script>
    <style>
        .step-line { height: 4px; background: #1f1f1f; flex-grow: 1; position: relative; top: 20px; z-index: -1; }
        .step-dot { width: 44px; height: 44px; border-radius: 50%; background: #0a0a0a; border: 4px solid #1f1f1f; display: flex; align-items: center; justify-content: center; transition: all 0.5s; color: #4b5563; }
        .step-dot.active { border-color: #ff6b00; color: #ff6b00; box-shadow: 0 0 20px rgba(255, 107, 0, 0.4); background: #141414; }
        .step-dot.completed { background: #ff6b00; border-color: #ff6b00; color: white; box-shadow: 0 0 15px rgba(255, 107, 0, 0.2); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ff3b3b, #ff6b00); width: 0%; transition: width 0.5s ease-in-out; border-radius: 9999px; }
        
        /* Nav Glassmorphism */
        .glass-nav {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<script>
    const user = localStorage.getItem("royalSweetsUser");
    if(!user){
        alert("Please login to continue");
        window.location.href="login.html";
    }
</script>
<body class="bg-dark-900 text-gray-300 font-sans antialiased min-h-screen pb-10">
    <!-- Video Preloader -->
    <div id="preloader" class="fixed inset-0 z-[9999] bg-black flex items-center justify-center transition-opacity duration-500 overflow-hidden">
        <video id="preloader-video" autoplay muted loop playsinline class="w-full h-full object-cover">
            <source src="loading.mp4" type="video/mp4">
        </video>
    </div>


    <!-- TOP NAV -->
    <nav class="sticky top-0 z-50 glass-nav px-6 py-5 shadow-sm mb-8">
        <div class="max-w-xl mx-auto flex items-center gap-4">
            <a href="my-orders.html" class="w-12 h-12 flex items-center justify-center rounded-full bg-dark-800 text-gray-400 shadow-sm border border-dark-700 hover:text-brand-orange hover:border-brand-orange transition-all duration-300">
                <i data-lucide="chevron-left" class="w-6 h-6"></i>
            </a>
            <h1 class="text-2xl font-display font-black text-white tracking-widest uppercase">Order <span class="text-brand-orange">Tracking</span></h1>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 mt-8">
        
        <div class="bg-dark-800 rounded-3xl p-8 shadow-[0_10px_40px_rgba(0,0,0,0.5)] border border-dark-700 text-center mb-8 relative overflow-hidden">
            <!-- decorative background elements -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-brand-orange/5 rounded-full blur-3xl"></div>
            <div class="absolute bottom-0 left-0 w-32 h-32 bg-brand-red/5 rounded-full blur-3xl"></div>

            <div class="mb-10 relative z-10">
                <p class="text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Estimated Arrival</p>
                <h2 class="text-5xl font-display font-black text-white italic tracking-wide">25 - <span class="text-brand-orange">35 MINS</span></h2>
            </div>

            <!-- PROGRESS BAR -->
            <div class="flex justify-between items-start relative mb-14 mt-12 px-2 z-10">
                <div class="absolute w-[calc(100%-2rem)] h-1.5 bg-dark-700 top-5 left-4 -z-10 rounded-full">
                    <div id="line-progress" class="progress-fill shadow-[0_0_10px_rgba(255,107,0,0.5)]"></div>
                </div>

                <div class="flex flex-col items-center gap-3">
                    <div id="step-1" class="step-dot active"><i data-lucide="check" class="w-5 h-5"></i></div>
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Accepted</span>
                </div>
                <div class="flex flex-col items-center gap-3">
                    <div id="step-2" class="step-dot"><i data-lucide="flame" class="w-5 h-5"></i></div>
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Kitchen</span>
                </div>
                <div class="flex flex-col items-center gap-3">
                    <div id="step-3" class="step-dot"><i data-lucide="bike" class="w-5 h-5"></i></div>
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">On Way</span>
                </div>
                <div class="flex flex-col items-center gap-3">
                    <div id="step-4" class="step-dot"><i data-lucide="home" class="w-5 h-5"></i></div>
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Arrived</span>
                </div>
            </div>

            <!-- STATUS BOX -->
            <div class="bg-dark-900 rounded-2xl p-5 border border-dark-700 flex items-center gap-5 text-left shadow-inner relative z-10">
                <div class="w-14 h-14 bg-fire-gradient rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand-orange/20 shrink-0" id="icon-container">
                    <i data-lucide="receipt" class="w-6 h-6"></i>
                </div>
                <div>
                    <h4 id="status-title" class="font-display font-bold text-white text-xl uppercase tracking-wide mb-1">Order Accepted</h4>
                    <p id="status-desc" class="text-sm text-brand-orange font-medium">Royal Sweets has confirmed your order.</p>
                </div>
            </div>
        </div>

        <!-- SUPPORT -->
        <div class="bg-dark-800 rounded-3xl p-6 md:p-8 flex items-center justify-between shadow-lg border border-dark-700">
            <div>
                <h4 class="font-display font-black text-2xl text-white italic uppercase tracking-wide mb-1">Need Help?</h4>
                <p class="text-sm text-gray-400 font-medium">Contact our royal support</p>
            </div>
            <div class="flex gap-3">
                <a href="tel:+919000000000" class="w-12 h-12 md:w-14 md:h-14 bg-dark-900 border border-dark-700 rounded-xl flex items-center justify-center text-white hover:text-brand-orange hover:border-brand-orange transition-colors shadow-inner">
                    <i data-lucide="phone" class="w-5 h-5 md:w-6 md:h-6"></i>
                </a>
                <a href="https://wa.me/919000000000" class="w-12 h-12 md:w-14 md:h-14 bg-green-500/10 border border-green-500/20 rounded-xl flex items-center justify-center text-green-500 hover:bg-green-500 hover:text-white transition-colors shadow-inner">
                    <i class="fa-brands fa-whatsapp text-2xl"></i>
                </a>
            </div>
        </div>

    </main>

    <script>
        lucide.createIcons();
        const parsedUser = JSON.parse(localStorage.getItem("royalSweetsUser"));

        async function updateTracker(){
            try{
                const res = await fetch(`https://restaurant-site-8y41.onrender.com/api/orders/user/${parsedUser._id}`);
                let orders = [];
                if (res.ok) {
                    orders = await res.json();
                }

                // Fallback to local storage if API is offline
                if(!orders || orders.length === 0) {
                    const localOrdersStr = localStorage.getItem(`orders_${parsedUser.phone}`);
                    if (localOrdersStr) orders = JSON.parse(localOrdersStr);
                }

                if(!orders.length) return;

                // Simple mechanism to get order ID from URL if possible, otherwise use latest
                const urlParams = new URLSearchParams(window.location.search);
                const queryId = urlParams.get("id");
                
                let order = orders[0]; 
                if (queryId) {
                    const matchedOrder = orders.find(o => o._id === queryId);
                    if (matchedOrder) order = matchedOrder;
                }

                const status = order.status || "Pending";

                const line = document.getElementById('line-progress');
                const title = document.getElementById('status-title');
                const desc = document.getElementById('status-desc');
                const iconContainer = document.getElementById('icon-container');

                const steps = {
                    Pending: { percent:0, step:1, title:"Order Accepted", desc:"The shop has received your order.", icon:"receipt" },
                    Accepted: { percent:0, step:1, title:"Order Accepted", desc:"The shop has received your order.", icon:"receipt" },
                    Kitchen: { percent:33, step:2, title:"In Kitchen", desc:"Your food is being prepared.", icon:"flame" },
                    "On the Way": { percent:66, step:3, title:"On The Way", desc:"Delivery partner is coming.", icon:"bike" },
                    "On Way": { percent:66, step:3, title:"On The Way", desc:"Delivery partner is coming.", icon:"bike" },
                    Arrived: { percent:100, step:4, title:"Delivered", desc:"Your order has arrived.", icon:"home" },
                    Delivered: { percent:100, step:4, title:"Delivered", desc:"Your order has arrived.", icon:"home" }
                };

                const data = steps[status] || steps["Pending"];

                /* progress line */
                line.style.width = data.percent + "%";

                /* text update */
                title.innerText = data.title;
                desc.innerText = data.desc;
                
                // carefully update lucide icon without breaking layout
                iconContainer.innerHTML = `<i data-lucide="${data.icon}" class="w-6 h-6"></i>`;
                lucide.createIcons();

                /* step dots */
                for(let i=1;i<=4;i++){
                    const dot = document.getElementById(`step-${i}`);
                    if(i < data.step){
                        dot.classList.add("completed");
                        dot.classList.remove("active");
                    }
                    else if(i === data.step){
                        dot.classList.add("active");
                        dot.classList.remove("completed");
                    }
                    else{
                        dot.classList.remove("active","completed");
                    }
                }

            }catch(err){
                console.log("Tracker update error:", err);
            }
        }

        /* update periodically */
        updateTracker();
        setInterval(updateTracker, 4000);

    </script>

    <!-- Preloader Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Set correct video for device
            const preloaderVideo = document.getElementById('preloader-video');
            if (preloaderVideo) {
                const isMobile = window.innerWidth < 768;
                const videoSrc = isMobile ? 'phone.mp4' : 'loading.mp4';
                preloaderVideo.src = videoSrc;
                preloaderVideo.load();
            }

            document.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', function(e) {
                    const href = this.getAttribute('href');
                    if (href && href.endsWith('.html') && !href.startsWith('#') && !this.hasAttribute('target') && !href.includes('mailto:') && !href.includes('tel:')) {
                        e.preventDefault();
                        const preloader = document.getElementById('preloader');
                        if (preloader) {
                            preloader.style.display = 'flex';
                            setTimeout(() => preloader.style.opacity = '1', 10);
                            setTimeout(() => window.location.href = href, 1500); // Fixed 1.5s transition
                        } else {
                            window.location.href = href;
                        }
                    }
                });
            });
        });

        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 500);
                }, 1500); // Fixed 1.5s load time
            }
        });
    </script>

</body>
</html>
