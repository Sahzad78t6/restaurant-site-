<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Sweets - Analytics Dashboard</title>
    <!-- Favicon -->
    <link rel="icon" href="logo.png" type="image/png">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#ff3b3b',
                            darkred: '#8b0000',
                            orange: '#ff6b00',
                        },
                        dark: {
                            900: '#0a0a0a',
                            800: '#141414',
                            700: '#1f1f1f',
                        }
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        display: ['Oswald', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-dark-900 text-gray-300 font-sans antialiased">
    <!-- Navbar -->
    <nav class="bg-dark-800 border-b border-white/5 py-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="admin.html" class="text-gray-400 hover:text-brand-orange transition-colors"
                    title="Back to Admin">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <h1 class="text-2xl font-display font-bold text-white tracking-widest uppercase">
                    Analytics <span class="text-brand-orange">Tracker</span>
                </h1>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <!-- Dashboard Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h2 class="text-xl font-bold text-white">Platform Metrics</h2>
                <p class="text-sm text-gray-400">Track visitors, orders, and revenue generated.</p>
            </div>

            <!-- Filters -->
            <div class="flex bg-dark-800 rounded-lg p-1 border border-dark-700 shadow-inner">
                <button onclick="changeFilter('day')" id="filter-day"
                    class="filter-btn active text-sm px-4 py-2 rounded-md font-medium text-white shadow-md bg-dark-700 hover:text-white transition-all">Today</button>
                <button onclick="changeFilter('week')" id="filter-week"
                    class="filter-btn text-sm px-4 py-2 rounded-md font-medium text-gray-400 hover:text-white hover:bg-dark-700/50 transition-all">This
                    Week</button>
                <button onclick="changeFilter('month')" id="filter-month"
                    class="filter-btn text-sm px-4 py-2 rounded-md font-medium text-gray-400 hover:text-white hover:bg-dark-700/50 transition-all">This
                    Month</button>
            </div>
        </div>

        <!-- Metrics Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <!-- Visits Card -->
            <div onclick="showDetails('visits')"
                class="cursor-pointer active:scale-95 bg-dark-800 border border-dark-700 rounded-2xl p-6 relative overflow-hidden group hover:border-brand-orange/50 transition-all shadow-md">
                <div
                    class="absolute -right-6 -bottom-6 opacity-5 group-hover:scale-110 transition-transform duration-500">
                    <i data-lucide="users" class="w-32 h-32 text-brand-orange"></i>
                </div>
                <div class="flex items-center gap-4 mb-4 relative z-10">
                    <div
                        class="w-12 h-12 rounded-xl bg-blue-500/10 border border-blue-500/30 flex items-center justify-center text-blue-400">
                        <i data-lucide="eye" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">Total Visits</h3>
                        <p class="text-xs text-gray-500 mt-0.5" id="visitLabel">Today</p>
                    </div>
                </div>
                <div class="relative z-10">
                    <h4 class="text-4xl font-display font-bold text-white tracking-wide" id="visitsCount">--</h4>
                </div>
            </div>

            <!-- Orders Card -->
            <div onclick="showDetails('orders')"
                class="cursor-pointer active:scale-95 bg-dark-800 border border-dark-700 rounded-2xl p-6 relative overflow-hidden group hover:border-brand-orange/50 transition-all shadow-md">
                <div
                    class="absolute -right-6 -bottom-6 opacity-5 group-hover:scale-110 transition-transform duration-500">
                    <i data-lucide="shopping-bag" class="w-32 h-32 text-brand-orange"></i>
                </div>
                <div class="flex items-center gap-4 mb-4 relative z-10">
                    <div
                        class="w-12 h-12 rounded-xl bg-brand-orange/10 border border-brand-orange/30 flex items-center justify-center text-brand-orange">
                        <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">Completed Orders</h3>
                        <p class="text-xs text-gray-500 mt-0.5" id="ordersLabel">Today</p>
                    </div>
                </div>
                <div class="relative z-10">
                    <h4 class="text-4xl font-display font-bold text-white tracking-wide" id="ordersCount">--</h4>
                </div>
            </div>

            <!-- Revenue Card -->
            <div onclick="showDetails('revenue')"
                class="cursor-pointer active:scale-95 bg-dark-800 border border-dark-700 rounded-2xl p-6 relative overflow-hidden group hover:border-brand-orange/50 transition-all shadow-md">
                <div
                    class="absolute -right-6 -bottom-6 opacity-5 group-hover:scale-110 transition-transform duration-500">
                    <i data-lucide="indian-rupee" class="w-32 h-32 text-brand-orange"></i>
                </div>
                <div class="flex items-center gap-4 mb-4 relative z-10">
                    <div
                        class="w-12 h-12 rounded-xl bg-green-500/10 border border-green-500/30 flex items-center justify-center text-green-400">
                        <i data-lucide="wallet" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">Revenue</h3>
                        <p class="text-xs text-gray-500 mt-0.5" id="revenueLabel">Today</p>
                    </div>
                </div>
                <div class="relative z-10">
                    <h4 class="text-4xl font-display font-bold text-white tracking-wide">₹<span
                            id="revenueCount">--</span></h4>
                </div>
            </div>
        </div>

        <!-- Detailed View Section -->
        <div id="detailsSection" class="hidden">
            <h3 class="text-xl font-bold text-white mb-4 border-b border-dark-700 pb-2" id="detailsTitle">Details</h3>
            <div class="bg-dark-800 border border-dark-700 rounded-xl overflow-hidden shadow-lg">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-gray-400" id="detailsTable">
                        <!-- Head headers populated by JS -->
                        <thead class="bg-dark-900/50 text-xs uppercase text-gray-500" id="detailsHead">
                        </thead>
                        <!-- Body rows populated by JS -->
                        <tbody class="divide-y divide-dark-700" id="detailsBody">
                        </tbody>
                    </table>
                </div>
                <!-- Empty State -->
                <div id="emptyState"
                    class="hidden py-12 text-center text-gray-500 flex-col items-center justify-center gap-2">
                    <i data-lucide="inbox" class="w-8 h-8 opacity-50 mx-auto"></i>
                    <p>No records found for this timeframe.</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Init Icons
        lucide.createIcons();

        // Check authentication
        const user = JSON.parse(localStorage.getItem('royalSweetsUser'));
        if (!user || user.role !== 'admin') {
            alert('Unauthorized Access');
            window.location.href = 'index.html';
        }

        let currentFilter = 'day';

        // Set up filters
        function changeFilter(filterType) {
            currentFilter = filterType;

            // UI Toggle
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-dark-700', 'text-white', 'shadow-md', 'active');
                btn.classList.add('text-gray-400');
            });
            const activeBtn = document.getElementById(`filter-${filterType}`);
            activeBtn.classList.add('bg-dark-700', 'text-white', 'shadow-md', 'active');
            activeBtn.classList.remove('text-gray-400');

            // Update Labels
            const labelText = filterType === 'day' ? 'Today' : filterType === 'week' ? 'This Week' : 'This Month';
            document.getElementById('visitLabel').innerText = labelText;
            document.getElementById('ordersLabel').innerText = labelText;
            document.getElementById('revenueLabel').innerText = labelText;

            fetchStats();
        }

        let globalVisitsData = [];
        let globalOrdersData = [];
        let currentActiveView = null; // 'visits', 'orders', 'revenue'

        async function fetchStats() {
            try {
                // Show loading state
                document.getElementById('visitsCount').innerText = '...';
                document.getElementById('ordersCount').innerText = '...';
                document.getElementById('revenueCount').innerText = '...';

                const res = await fetch(`https://restaurant-site-8y41.onrender.com/api/tracker/stats?filter=${currentFilter}`);
                const data = await res.json();

                if (data.success) {
                    // Update stats
                    document.getElementById('visitsCount').innerText = data.visits;
                    document.getElementById('ordersCount').innerText = data.orders;
                    // Format revenue
                    document.getElementById('revenueCount').innerText = new Intl.NumberFormat('en-IN').format(data.revenue);

                    // Save detailed arrays globally
                    globalVisitsData = data.visitsData || [];
                    globalOrdersData = data.ordersData || [];

                    // Re-render table if open
                    if (currentActiveView) {
                        showDetails(currentActiveView);
                    }

                } else {
                    console.error("Failed to load stats:", data.error);
                    alert("Could not load stats data.");
                }

            } catch (e) {
                console.error("Error fetching stats:", e);
                // alert("Network error while trying to fetch stats.");
            }
        }

        function showDetails(viewType) {
            currentActiveView = viewType;
            const detailsSection = document.getElementById('detailsSection');
            const detailsTitle = document.getElementById('detailsTitle');
            const detailsHead = document.getElementById('detailsHead');
            const detailsBody = document.getElementById('detailsBody');
            const detailsTable = document.getElementById('detailsTable');
            const emptyState = document.getElementById('emptyState');

            detailsSection.classList.remove('hidden');

            // Reset UI
            detailsHead.innerHTML = '';
            detailsBody.innerHTML = '';
            emptyState.classList.add('hidden');
            detailsTable.classList.remove('hidden');

            let rowsHTML = '';

            if (viewType === 'visits') {
                detailsTitle.innerHTML = 'Detailed View: <span class="text-blue-400">Total Visits</span>';
                detailsHead.innerHTML = `
                    <tr>
                        <th class="px-6 py-4 font-medium tracking-wider">Date & Time</th>
                        <th class="px-6 py-4 font-medium tracking-wider">Page Accessed</th>
                    </tr>
                `;

                if (globalVisitsData.length === 0) {
                    detailsTable.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                } else {
                    globalVisitsData.forEach(v => {
                        rowsHTML += `
                            <tr class="hover:bg-dark-900/40 transition">
                                <td class="px-6 py-4 whitespace-nowrap">${new Date(v.timestamp).toLocaleString()}</td>
                                <td class="px-6 py-4 whitespace-nowrap"><span class="bg-blue-500/10 text-blue-400 px-2 py-1 rounded-md text-xs font-mono border border-blue-500/20">${v.page}</span></td>
                            </tr>
                        `;
                    });
                }
            } else if (viewType === 'orders' || viewType === 'revenue') {
                detailsTitle.innerHTML = viewType === 'orders'
                    ? 'Detailed View: <span class="text-brand-orange">Completed Orders</span>'
                    : 'Detailed View: <span class="text-green-400">Revenue Breakdown</span>';

                detailsHead.innerHTML = `
                    <tr>
                        <th class="px-6 py-4 font-medium tracking-wider">Date</th>
                        <th class="px-6 py-4 font-medium tracking-wider">Order ID</th>
                        <th class="px-6 py-4 font-medium tracking-wider">Customer</th>
                        <th class="px-6 py-4 font-medium tracking-wider text-right">Revenue</th>
                    </tr>
                `;

                if (globalOrdersData.length === 0) {
                    detailsTable.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                } else {
                    globalOrdersData.forEach(o => {
                        const idSnippet = o._id.substring(o._id.length - 6).toUpperCase();
                        rowsHTML += `
                            <tr class="hover:bg-dark-900/40 transition">
                                <td class="px-6 py-4 whitespace-nowrap text-xs">${new Date(o.createdAt).toLocaleString()}</td>
                                <td class="px-6 py-4 whitespace-nowrap font-mono text-gray-300">...${idSnippet}</td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-gray-300">${o.customerName}</div>
                                    <div class="text-[10px] text-gray-500">${o.phone}</div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-right font-medium text-white">₹ ${new Intl.NumberFormat('en-IN').format(o.revenue)}</td>
                            </tr>
                        `;
                    });
                }
            }

            detailsBody.innerHTML = rowsHTML;

            // Scroll down a bit on mobile
            if (window.innerWidth < 768) {
                detailsSection.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Fetch initially on load
        fetchStats();

    </script>
</body>

</html>
