<!DOCTYPE html>
<html>
<head>

<title>Collect Payment</title>
    <!-- Favicon -->
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta property="og:image" content="logo.png">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    


<div class="bg-white p-10 rounded-3xl shadow-xl w-[350px] text-center">

<h2 class="text-2xl font-black mb-6">
Collect Payment
</h2>

<p class="text-sm text-gray-500 mb-8">
Select payment received from customer
</p>

<button onclick="pay('Cash')" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold mb-4">
Cash Received
</button>

<button onclick="pay('UPI')" class="w-full bg-blue-500 text-white py-4 rounded-xl font-bold">
UPI Received
</button>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>

const params = new URLSearchParams(window.location.search);
const orderId = params.get("orderId");

// Load the exact order total on page load to configure Razorpay
let orderTotal = 0;
let userPhone = "9999999999";

async function fetchOrderDetails() {
    try {
        const res = await fetch(`https://restaurant-site-8y41.onrender.com/api/orders/${orderId}`);
        if(res.ok) {
            const data = await res.json();
            orderTotal = data.total;
            userPhone = data.phone || "9999999999";
        }
    } catch (e) {
        console.error("Could not fetch order details", e);
    }
}
fetchOrderDetails();

async function pay(method) {

    if (method === "Cash") {
        try {
            await fetch(`https://restaurant-site-8y41.onrender.com/api/orders/collect-payment/${orderId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ method: method })
            });

            alert("Cash payment collected successfully");
            window.location.href = "delivery-dashboard.html";
        } catch(e) {
            alert("Error collecting cash payment");
        }
    } else if (method === "UPI") {
        if (!orderTotal) {
            alert("Loading order details, please wait a second and try again.");
            return;
        }

        try {
            // 1. Create a Razorpay order from backend
            const orderRes = await fetch("https://restaurant-site-8y41.onrender.com/api/orders/razorpay/create-order", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ amount: orderTotal })
            });
            const orderData = await orderRes.json();

            // 2. Open Razorpay Interface (Scanning QR etc)
            const options = {
                key: "rzp_" + "live_SPMT8sf7wug9lY", 
                amount: orderData.amount,
                currency: orderData.currency,
                name: "Royal Sweets - Delivery",
                description: "Order #" + orderId.slice(-6),
                image: "https://your-logo-url.com/logo.png", // replace if you have one
                order_id: orderData.id,
                handler: async function (response) {
                    
                    // 3. Verify Payment
                    try {
                        const verifyRes = await fetch("https://restaurant-site-8y41.onrender.com/api/orders/razorpay/verify-delivery", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                razorpay_order_id: response.razorpay_order_id,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_signature: response.razorpay_signature,
                                orderId: orderId
                            })
                        });

                        const verifyData = await verifyRes.json();

                        if (verifyData.success) {
                            alert("UPI Payment Verified Successfully!");
                            window.location.href = "delivery-dashboard.html";
                        } else {
                            alert("Payment verification failed! Please try again.");
                        }
                    } catch (err) {
                        alert("Error connecting to server for verification.");
                    }
                },
                prefill: {
                    contact: userPhone
                },
                theme: {
                    color: "#ff6b00"
                }
            };

            const rzp = new Razorpay(options);
            
            rzp.on('payment.failed', function (response){
                alert("Payment Failed. Reason: " + response.error.description);
            });

            rzp.open();

        } catch (err) {
            console.error(err);
            alert("Could not initialize Razorpay checkout. Please check connection.");
        }
    }
}

</script>


    

</body>
</html>
