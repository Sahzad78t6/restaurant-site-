<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delivery Dashboard | Royal Sweets</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
}

.glass-header{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(12px);
}

.order-card{
transition:all 0.3s ease;
}

.order-card:hover{
transform:translateY(-5px);
}

.address-box{
display:-webkit-box;
-webkit-line-clamp:3;
line-clamp:3;
-webkit-box-orient:vertical;
overflow:hidden;
min-height:60px;
}

</style>
</head>

<body class="bg-[#F8F9FA] min-h-screen pb-12">

<nav class="sticky top-0 z-50 glass-header border-b border-gray-100 px-6 py-5 mb-8">

<div class="max-w-6xl mx-auto flex justify-between items-center">

<div class="flex items-center gap-4">

<div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-orange-500 shadow-lg">
<i class="fa-solid fa-truck-fast text-xl"></i>
</div>

<div>
<h1 class="text-2xl font-black tracking-tight text-gray-800 uppercase italic">
Delivery Panel
</h1>

<p class="text-[10px] font-black text-orange-500 uppercase tracking-[0.2em]">
Live MongoDB Sync
</p>
</div>

</div>

<div class="flex items-center gap-4">

<div class="hidden md:block text-right">
<p id="orderCount" class="text-sm font-black text-gray-800">
0 Active Orders
</p>

<p class="text-[10px] font-bold text-gray-400 uppercase">
System Online
</p>
</div>

<button onclick="loadOrders()"
class="w-11 h-11 bg-white border border-gray-100 rounded-xl shadow-sm flex items-center justify-center hover:bg-orange-500 hover:text-white transition">
<i class="fa-solid fa-rotate"></i>
</button>

</div>
</div>
</nav>

<main class="max-w-6xl mx-auto px-6">

<div id="ordersContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

<div class="col-span-full flex flex-col items-center justify-center py-32 opacity-20">
<i class="fa-solid fa-spinner fa-spin text-5xl mb-4"></i>

<p class="font-black uppercase tracking-widest">
Fetching Orders...
</p>

</div>

</div>
</main>

<script>

const statusTheme={
'Accepted':'bg-slate-100 text-slate-600 border-slate-200',
'Kitchen':'bg-orange-100 text-orange-600 border-orange-200',
'On Way':'bg-blue-100 text-blue-600 border-blue-200',
'Arrived':'bg-green-100 text-green-600 border-green-200'
};

let activeOrderId=null;
let watchId=null;

let deliveryBoyName = localStorage.getItem("royalSweetsDeliveryBoy");
if (!deliveryBoyName) {
    deliveryBoyName = prompt("Welcome! Please enter your name to access the Delivery Dashboard:");
    if (deliveryBoyName && deliveryBoyName.trim() !== "") {
         localStorage.setItem("royalSweetsDeliveryBoy", deliveryBoyName.trim());
    } else {
         alert("Name is required to accept orders.");
         window.location.href = "index.html";
    }
}

const statusRank = {
    'Accepted': 1,
    'Kitchen': 2,
    'On Way': 3,
    'Arrived': 4
};

async function loadOrders(){

try{

const res=await fetch("https://restaurant-site-8y41.onrender.com/api/orders");
let orders=await res.json();

// Filter out completed orders
orders = orders.filter(o => o.status !== "Arrived");

const container=document.getElementById("ordersContainer");

document.getElementById("orderCount").innerText=`${orders.length} Active Orders`;

container.innerHTML="";

orders.reverse().forEach(order=>{

const theme=statusTheme[order.status] || statusTheme['Accepted'];

const isClaimedByOther = order.deliveryBoyName && order.deliveryBoyName !== deliveryBoyName;
const disableStr = isClaimedByOther ? "opacity-50 cursor-not-allowed pointer-events-none grayscale" : "";
const claimedBadge = order.deliveryBoyName 
      ? `<span class="text-[9px] font-bold text-orange-500 uppercase ml-2 bg-orange-50 px-2 py-0.5 rounded border border-orange-100 flex items-center gap-1 mt-1 w-fit"><i class="fa-solid fa-user"></i> ${order.deliveryBoyName}</span>` 
      : "";

container.innerHTML+=`

<div class="order-card bg-white rounded-[2.5rem] border border-gray-100 shadow-sm overflow-hidden flex flex-col">

<div class="p-6 pb-4 flex justify-between items-start border-b border-gray-50 bg-gray-50/50">

<div>
<div class="flex flex-col">
<span class="text-[10px] font-black px-3 py-1 rounded-full uppercase border ${theme} w-fit">
${order.status}
</span>
${claimedBadge}
</div>

<h2 class="text-xl font-black text-gray-800 mt-3 italic tracking-tighter">
#${order._id.slice(-6)}
</h2>
</div>

<div class="text-right">
<p class="text-2xl font-black text-orange-500 italic">
₹${order.total}
</p>

<p class="text-[10px] font-bold text-gray-400 uppercase">
${order.paymentMethod || "COD"}
</p>
</div>

</div>

<div class="p-6 flex-grow flex flex-col">

<p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">
Order Items
</p>

<div class="space-y-2 mb-4">
${order.items.map(item=>`
<div class="flex justify-between text-xs font-bold text-gray-600">
<span>${item.name}</span>
<span class="text-gray-400">x${item.qty || 1}</span>
</div>
`).join('')}
</div>

<p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">
Customer Phone
</p>

<p class="text-sm font-bold text-gray-700 mb-4">
${order.phone || "Not Provided"}
</p>

<p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">
Delivery Address
</p>

<p class="text-xs text-gray-600 mb-6 address-box">
${order.address || "Address not available"}
</p>

${order.paymentMethod==="COD" && !order.paymentCollected ? `
<button onclick="openPaymentPage('${order._id}')"
class="bg-yellow-500 text-white py-3 rounded-xl text-xs font-black uppercase mb-4">
Collect Payment
</button>
` : ""}

<div class="grid grid-cols-3 gap-2 mb-4">

<button onclick="updateStatus('${order._id}', 'Kitchen', '${order.status}')"
class="bg-orange-50 text-orange-600 py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-orange-600 hover:text-white transition-colors ${disableStr}">
Kitchen
</button>

<button onclick="startDelivery('${order._id}', '${order.status}')"
class="bg-blue-50 text-blue-600 py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-blue-600 hover:text-white transition-colors ${disableStr}">
On Way
</button>

<button onclick="arrivedCheck('${order._id}', '${order.paymentMethod}', ${order.paymentCollected}, '${order.status}')"
class="bg-green-50 text-green-600 py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-green-600 hover:text-white transition-colors ${disableStr}">
Arrived
</button>

</div>

<div class="flex gap-2 mt-auto">

<a href="tel:${order.phone || ""}"
class="flex-1 text-center bg-green-500 text-white py-3 rounded-xl text-xs font-black uppercase">
Call
</a>

<button onclick="openMap('${order.address || ""}')"
class="flex-1 bg-orange-500 text-white py-3 rounded-xl text-xs font-black uppercase">
View Map
</button>

</div>

</div>

<div class="px-6 py-4 bg-gray-50 border-t flex justify-between items-center">

<p class="text-[10px] font-bold text-gray-400 uppercase">
<i class="fa-regular fa-clock mr-1"></i>
${new Date(order.createdAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
</p>

</div>

</div>

`;

});

}catch(err){

console.log("Dashboard Error:",err);

}

}

function openPaymentPage(orderId){

window.location.href=`payment.html?orderId=${orderId}`;

}

async function updateStatus(id, newStatus, currentStatus){

if (currentStatus && statusRank[newStatus] < statusRank[currentStatus]) {
    const confirmRevert = confirm(`Are you sure you want to revert this order back to '${newStatus}'?`);
    if (!confirmRevert) return;
}

try {
    const res = await fetch(`https://restaurant-site-8y41.onrender.com/api/orders/status/${id}`,{
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ status: newStatus, deliveryBoyName })
    });
    
    const data = await res.json();
    if (!data.success && data.message) {
         alert(data.message);
    }

    loadOrders();
} catch(err){
    console.error("Status Update Error:", err);
}

}

function startDelivery(orderId, currentStatus){

updateStatus(orderId,"On Way", currentStatus);

startTracking(orderId);

}

function startTracking(orderId){

activeOrderId = orderId;

if(!navigator.geolocation){

alert("Geolocation not supported");

return;

}

watchId = navigator.geolocation.watchPosition(async function(position){

const lat = position.coords.latitude;
const lng = position.coords.longitude;

await fetch(`https://restaurant-site-8y41.onrender.com/api/orders/location/${orderId}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
lat,
lng
})

});

},function(error){

console.log("GPS Error",error);

},{
enableHighAccuracy:true
});

}

function arrivedCheck(id,paymentMethod,paymentCollected, currentStatus){

if(paymentMethod==="COD" && !paymentCollected){

alert("Collect payment before marking order as Arrived");

return;

}

if(watchId){

navigator.geolocation.clearWatch(watchId);

}

updateStatus(id,"Arrived", currentStatus);

}

function openMap(address){

if(!address){
alert("Customer address not available");
return;
}

const url=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;

window.open(url,"_blank");

}

window.onload=loadOrders;

setInterval(loadOrders,30000);

</script>
</body>
</html>
